name: Project Health Check

permissions:
  contents: read

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'npm'

      - name: Clean install dependencies
        run: npm ci

      - name: Check types & lint
        run: npm run check

      - name: Build project
        run: npm run build

      - name: Run tests
        run: npm run test
