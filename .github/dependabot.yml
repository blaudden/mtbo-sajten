version: 2
updates:
  # Maintain npm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Stockholm"
    # Limit open PRs to 2 (one for minor/patch group, one for major group)
    open-pull-requests-limit: 2

    # Group updates intelligently by severity
    groups:
      # Group 1: All safe minor and patch operations into one single PR
      all-npm-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
          
      # Group 2: All major upgrades into a single separate PR (acts as a warning radar)
      all-npm-major:
        patterns:
          - "*"
        update-types:
          - "major"
    # Add labels for easy filtering
    labels:
      - "dependencies"
      - "automated"
    # Prefix commit messages
    commit-message:
      prefix: "chore"
      prefix-development: "chore(dev)"
      include: "scope"
    # Allow Dependabot to rebase PRs automatically
    rebase-strategy: "auto"
    # Review security updates more frequently
    # (they will still be created even if weekly limit is reached)
    versioning-strategy: "increase"

  # Monitor GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Stockholm"
    open-pull-requests-limit: 1
    groups:
      all-actions:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "github-actions"
      - "automated"
    commit-message:
      prefix: "ci"
