# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: "en-US"
tone_instructions: |
  Be professional and concise.
  Group related suggestions for the same file into a single coherent comment.
  Focus on logic, security, and performance.
  Do not comment on formatting or style issues handled by Prettier/Stylelint.

reviews:
  profile: "chill"
  path_filters:
    - "!public/**"            # Ignore all assets, images, and static files
    - "!src/data/**"           # Ignore all data/JSON files (including events)
    - "!**/*.lock"             # Ignore lock files
  path_instructions:
    - path: "scripts/**"
      instructions: "These are build-time scripts. Focus on stability and data integrity."
    - path: "src/components/**"
      instructions: "Ensure functional consistency and proper use of Astro components. Do not comment on formatting or CSS style issues handled by Prettier/Stylelint."
